<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technoloja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>technolouja</h1>
    </header>

    <main>
        <section class="banner">
            <h1>Promoção Geek</h1>
            <p>Produtos selecionados</p>
            <button>Ver produtos</button>
        </section>

        <section class="produtos">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:AND9GcRKEov ja8eJeXaQ9wn9hoXINuf WWYCOKaGg&s" alt="Xbox Series X">
                <h3>Xbox Series X</h3>
                <p>R$ 3019,90</p>
                <a href="#">Ver Produto</a>
            </div>
        </section>
    </main>

    <section class="contato">
        <form>
            <input type="text" placeholder="Seu nome">
            <textarea placeholder="Escreva uma mensagem"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <h2>F-Tech</h2>
        <p>Quem somos nos</p>
        <p>Política de privacidade</p>
    </footer>
</body>
</html>
